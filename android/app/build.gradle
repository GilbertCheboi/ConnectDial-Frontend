apply plugin: "com.android.application"
apply plugin: "org.jetbrains.kotlin.android"
apply plugin: "com.facebook.react"

/**
 * React Native configuration block.
 */
react {
    autolinkLibrariesWithApp()
}

/**
 * Proguard minification for release builds.
 */
def enableProguardInReleaseBuilds = true

/**
 * JavaScriptCore flavor.
 */
def jscFlavor = 'io.github.react-native-community:jsc-android:2026004.+'

android {
    ndkVersion rootProject.ext.ndkVersion
    buildToolsVersion rootProject.ext.buildToolsVersion
    compileSdk rootProject.ext.compileSdkVersion

    namespace "com.connectmobile.app"

    defaultConfig {
        applicationId "com.connectmobile.app"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion

        // ✅ Bump versionCode every time you upload to Play Store
        versionCode 7
        versionName "1.1.1"

        // ✅ Keeps only your app's language resources (reduces APK size)
        resConfigs "en"

        // ✅ Enable multidex for large apps
        multiDexEnabled true
    }

    signingConfigs {
        debug {
            storeFile file(System.getProperty("user.home") + "/.android/debug.keystore")
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }

        release {
            if (project.hasProperty('MYAPP_UPLOAD_STORE_FILE')) {
                storeFile file(MYAPP_UPLOAD_STORE_FILE)
                storePassword MYAPP_UPLOAD_STORE_PASSWORD
                keyAlias MYAPP_UPLOAD_KEY_ALIAS
                keyPassword MYAPP_UPLOAD_KEY_PASSWORD
            }
        }
    }

    buildTypes {
        debug {
            signingConfig signingConfigs.debug
            // ✅ Append .debug to app ID so debug & release can coexist on same device
            //applicationIdSuffix ".debug"
            //versionNameSuffix "-debug"
        }

        release {
            signingConfig signingConfigs.release

            // ✅ Minify & shrink for smaller production build
            minifyEnabled enableProguardInReleaseBuilds
            shrinkResources enableProguardInReleaseBuilds

            proguardFiles getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro"

            // ✅ Ensures release build is not debuggable
            debuggable false
        }
    }

	 splits {
	    abi {
		enable false
		reset()
		universalApk false
	    }
	}

    // ✅ Consistent packaging options
    packagingOptions {
        pickFirst 'lib/x86/libc++_shared.so'
        pickFirst 'lib/x86_64/libc++_shared.so'
        pickFirst 'lib/armeabi-v7a/libc++_shared.so'
        pickFirst 'lib/arm64-v8a/libc++_shared.so'
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

dependencies {
    implementation("com.facebook.react:react-android")
    implementation 'com.google.android.gms:play-services-auth:20.5.0'

    // ✅ Multidex support
    implementation 'androidx.multidex:multidex:2.0.1'

    if (hermesEnabled.toBoolean()) {
        implementation("com.facebook.react:hermes-android")
    } else {
        implementation jscFlavor
    }
}

apply plugin: 'com.google.gms.google-services'
apply from: "../../node_modules/react-native-vector-icons/fonts.gradle"
